name: Build Signed APK

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Release version name (e.g. 1.0.1). Computes versionCode as MAJOR*10000 + MINOR*100 + PATCH.'
        required: true
      release_notes:
        description: 'Release notes shown in the update dialog.'
        required: false
        default: ''
      mandatory:
        description: 'Force install (no Skip / Later buttons in the dialog).'
        type: choice
        required: false
        default: 'false'
        options:
          - 'true'
          - 'false'

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      ENEVERRE_HOST: ${{ secrets.ENEVERRE_HOST }}
      UPDATE_TOKEN: ${{ secrets.UPDATE_PUBLISH_TOKEN }}
      VERSION_NAME: ${{ inputs.version_name }}
      RELEASE_NOTES: ${{ inputs.release_notes }}
      MANDATORY: ${{ inputs.mandatory }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute versionCode
        id: version
        run: |
          set -euo pipefail
          IFS='.' read -r MAJOR MINOR PATCH <<< "${VERSION_NAME}"
          if [[ -z "${MAJOR:-}" || -z "${MINOR:-}" || -z "${PATCH:-}" ]]; then
            echo "::error::version_name must be in MAJOR.MINOR.PATCH form (got '${VERSION_NAME}')"
            exit 1
          fi
          echo "version_code=$((MAJOR * 10000 + MINOR * 100 + PATCH))" >> "$GITHUB_OUTPUT"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/keystore.jks

      - name: Build Release APK
        run: |
          ./gradlew assembleRelease \
            -PENEVERRE_HOST=${ENEVERRE_HOST} \
            -PVERSION_NAME=${VERSION_NAME} \
            -PVERSION_CODE=${{ steps.version.outputs.version_code }} \
            -PSTORE_FILE=keystore.jks \
            -PSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }} \
            -PKEY_ALIAS=${{ secrets.KEY_ALIAS }} \
            -PKEY_PASSWORD=${{ secrets.KEY_PASSWORD }} \
            --configuration-cache

      - name: Upload ARM64 APK
        uses: actions/upload-artifact@v4
        with:
          name: eneverre-tv-arm64-${{ inputs.version_name }}.apk
          path: app/build/outputs/apk/release/*arm64*.apk

      - name: Upload ARMv7 APK
        uses: actions/upload-artifact@v4
        with:
          name: eneverre-tv-armv7-${{ inputs.version_name }}.apk
          path: app/build/outputs/apk/release/*armeabi*.apk

      - name: Upload Universal APK
        uses: actions/upload-artifact@v4
        with:
          name: eneverre-tv-universal-${{ inputs.version_name }}.apk
          path: app/build/outputs/apk/release/*universal*.apk

      - name: Publish updates to eneverre-api
        env:
          VERSION_CODE: ${{ steps.version.outputs.version_code }}
        run: |
          set -euo pipefail
          if [[ -z "${UPDATE_TOKEN}" ]]; then
            echo "::error::UPDATE_PUBLISH_TOKEN secret is empty. Cannot publish."
            exit 1
          fi

          ARM64_APK=$(ls app/build/outputs/apk/release/*arm64*.apk    | head -n 1)
          ARMV7_APK=$(ls app/build/outputs/apk/release/*armeabi*.apk  | head -n 1)
          if [[ -z "${ARM64_APK}" || ! -f "${ARM64_APK}" ]]; then
            echo "::error::No arm64 APK found."; exit 1
          fi
          if [[ -z "${ARMV7_APK}" || ! -f "${ARMV7_APK}" ]]; then
            echo "::error::No armv7 APK found."; exit 1
          fi

          declare -a ENTRIES=(
            "arm64-v8a:${ARM64_APK}"
            "armeabi-v7a:${ARMV7_APK}"
          )

          LAST_INDEX=$(( ${#ENTRIES[@]} - 1 ))
          for i in "${!ENTRIES[@]}"; do
            entry="${ENTRIES[$i]}"
            abi="${entry%%:*}"
            apk="${entry##*:}"
            if [[ "${i}" -eq "${LAST_INDEX}" ]]; then
              finalize=true
            else
              finalize=false
            fi

            echo "Publishing: ${apk} as ${abi} (finalize=${finalize})"
            HTTP_STATUS=$(curl --max-time 1800 -sS -o "publish-${abi}.json" -w "%{http_code}" \
              -H "Authorization: Bearer ${UPDATE_TOKEN}" \
              -F "apk_${abi}=@${apk}" \
              -F "versionName=${VERSION_NAME}" \
              -F "versionCode=${VERSION_CODE}" \
              -F "releaseNotes=${RELEASE_NOTES}" \
              -F "mandatory=${MANDATORY}" \
              -F "finalize=${finalize}" \
              -X POST "${ENEVERRE_HOST}api/admin/app/updates/tv")

            echo "HTTP ${HTTP_STATUS}:"
            cat "publish-${abi}.json"
            echo

            case "${HTTP_STATUS}" in
              2*) ;;
              401) echo "::error::Publish unauthorized (401). Check UPDATE_PUBLISH_TOKEN / header."; exit 1 ;;
              413) echo "::error::Body too large (413). Raise [updates] max_apk_size on the server."; exit 1 ;;
              422) echo "::error::Malformed body (422). Inspect the response."; exit 1 ;;
              503) echo "::error::Publish disabled on the server (503). No publish_token configured."; exit 1 ;;
              *)   echo "::error::Publish failed with HTTP ${HTTP_STATUS}."; exit 1 ;;
            esac
          done
