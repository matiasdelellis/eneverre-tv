plugins {
    alias(libs.plugins.android.application)
}

def localProps = new Properties()
localProps.load(new FileInputStream(rootProject.file("local.properties")))

android {
    namespace 'ar.com.delellis.eneverretv'

    compileSdk 36

    defaultConfig {
        applicationId "ar.com.delellis.eneverretv"
        minSdk 24
        targetSdk 36
        versionCode 1
        versionName "1.0"
        buildConfigField "String", "API_HOST", "\"${localProps['API_HOST']}\""
        buildConfigField "String", "API_USER", "\"${localProps['API_USER']}\""
        buildConfigField "String", "API_PASS", "\"${localProps['API_PASS']}\""
    }

    buildTypes {
        release {
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    buildFeatures {
        buildConfig true
        compose false
    }
}

dependencies {
    implementation "androidx.core:core-splashscreen:1.0.1"
    implementation "androidx.tvprovider:tvprovider:1.0.0"
    implementation 'org.videolan.android:libvlc-all:3.7.0'

    implementation 'com.squareup.retrofit2:retrofit:2.11.0'
    implementation 'com.squareup.retrofit2:converter-gson:2.11.0'
    implementation 'com.squareup.okhttp3:okhttp:4.12.0'
    implementation 'com.squareup.okhttp3:logging-interceptor:4.12.0'

    implementation libs.appcompat
    implementation libs.material
    implementation libs.leanback
}